# Book settings
title: Computational Materials Science Notes
author: Harrison Li
copyright: "2025"
logo: ""

# Jekyll settings (for GitHub Pages)
liquid:
  error_mode: warn
  strict_filters: false
  strict_variables: false

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge
  parse_block_html: true
  parse_span_html: true

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: "**/*.md"
    values:
      render_with_liquid: false

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: off  # off because we're using Markdown files

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: computational-materials-notes.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/Harrison-Li/Computational-materials-notes
  path_to_book: ""
  branch: main

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  home_page_in_navbar: true
  baseurl: https://harrison-li.github.io/Computational-materials-notes/

# Parse and render settings
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - html_admonition
    - html_image
    - linkify
    - replacements
    - smartquotes
    - substitution
    - tasklist
  myst_dmath_double_inline: true

sphinx:
  extra_extensions:
    - sphinx_proof
  config:
    html_theme: sphinx_book_theme
    html_theme_options:
      search_bar_text: "Search this book..."
      launch_buttons:
        notebook_interface: "jupyterlab"
      repository_url: https://github.com/Harrison-Li/Computational-materials-notes
      use_repository_button: true
      use_issues_button: true
      use_edit_page_button: true
      path_to_docs: ""
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    mathjax3_config:
      tex:
        inlineMath: [['$', '$'], ['\\(', '\\)']]
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
        processEscapes: true
        processEnvironments: true
      options:
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      loader:
        load: ['[tex]/ams', '[tex]/boldsymbol', '[tex]/mathtools']
      tex2jax:
        inlineMath: [['$', '$'], ['\\(', '\\)']]
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
